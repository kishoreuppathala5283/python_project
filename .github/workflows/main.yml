name: Python CI/CD to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11  # Set your Python version

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest  # Ensure pytest is installed

      # 4️⃣ Run tests (optional if tests/ folder exists)
      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            echo "Running tests in tests/ folder..."
            pytest tests/
          else
            echo "No tests folder found, skipping pytest."
          fi

      # 5️⃣ SSH to EC2 and deploy
      - name: SSH and deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Create project folder if it doesn't exist
            sudo mkdir -p /var/www/python_app
            sudo chown -R ubuntu:ubuntu /var/www/python_app
            sudo chmod -R 755 /var/www/python_app

            # Clone repo or pull latest changes
            if [ -d "/var/www/python_app/.git" ]; then
              cd /var/www/python_app
              git reset --hard
              git pull origin main
            else
              git clone "https://github.com/kishoreuppathala5283/python_project.git" /var/www/python_app
            fi

            # Navigate to project folder
            cd /var/www/python_app

            # Install dependencies on EC2
            pip install --user -r requirements.txt

            # Stop previous app if running and start the app
            if systemctl is-active --quiet python_app; then
              sudo systemctl restart python_app
            else
              # Do not modify this, use nohup as requested
              nohup python3 app.py &
            fi
