name: Flask CI/CD to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code locally
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python locally
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies locally
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run tests (optional)
      - name: Run tests
        run: |
          pytest || echo "No tests found, skipping."

      # 5️⃣ SSH into EC2 to deploy with Gunicorn
      - name: SSH and deploy with Gunicorn
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Install dependencies
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-venv python3-pip git

            # Create deployment folder
            sudo mkdir -p /var/www/flask_app
            sudo chown -R ubuntu:ubuntu /var/www/flask_app
            sudo chmod -R 755 /var/www/flask_app

            # Clone or update repo
            if [ -d "/var/www/flask_app/.git" ]; then
              cd /var/www/flask_app
              git reset --hard
              git pull origin main
            else
              git clone "https://github.com/<your-username>/<your-repo>.git" /var/www/flask_app
              cd /var/www/flask_app
            fi

            # Setup virtual environment
            cd /var/www/flask_app
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install gunicorn

            # Kill old Gunicorn processes (if any)
            pkill -f "gunicorn" || true

            # Start Flask app with Gunicorn
            nohup venv/bin/gunicorn -w 3 -b 0.0.0.0:5000 app:app > app.log 2>&1 &
