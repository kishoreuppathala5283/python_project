name: Python CI/CD to EC2 (Ubuntu + venv + systemd)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python locally (optional)
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies locally (optional)
      - name: Install dependencies locally
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run tests
      - name: Run tests
        run: |
          pytest tests/ || echo "No tests found"

      # 5️⃣ SSH to EC2 and deploy using virtual environment + systemd
      - name: SSH and deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Update system and install dependencies
            sudo apt update && sudo apt install -y python3-venv python3-pip git

            # Create project folder
            sudo mkdir -p /var/www/python_project
            sudo chown -R ubuntu:ubuntu /var/www/python_project
            sudo chmod -R 755 /var/www/python_project

            # Clone repo or pull latest changes
            if [ -d "/var/www/python_project/.git" ]; then
              cd /var/www/python_project
              git reset --hard
              git pull origin main
            else
              git clone "https://github.com/kishoreuppathala5283/python_project.git" /var/www/python_project
            fi

            cd /var/www/python_project

            # Create virtual environment if not exists
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            # Activate virtual environment and install dependencies
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Setup systemd service if it doesn't exist
            if [ ! -f "/etc/systemd/system/python_project.service" ]; then
sudo tee /etc/systemd/system/python_project.service > /dev/null <<EOL
[Unit]
Description=Python Project App
After=network.target

[Service]
User=ubuntu
WorkingDirectory=/var/www/python_project
ExecStart=/var/www/python_project/venv/bin/python app.py
Restart=always
Environment=PYTHONUNBUFFERED=1

[Install]
WantedBy=multi-user.target
EOL
              sudo systemctl daemon-reload
              sudo systemctl enable python_project
            fi

            # Restart the app service
            sudo systemctl restart python_project
            sudo systemctl status python_project --no-pager
