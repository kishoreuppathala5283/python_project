name: Flask CI/CD to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python locally
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies locally
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt, skipping"

      # 4️⃣ Run tests (optional)
      - name: Run tests
        run: |
          pytest || echo "No tests found, skipping"

      # 5️⃣ SSH into EC2 to deploy with Gunicorn
      - name: SSH and deploy Flask app
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Install system dependencies
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-venv python3-pip git

            # Clone or update repo
            if [ -d "/var/www/flask_app/.git" ]; then
                cd /var/www/flask_app
                git reset --hard
                git pull origin main
            else
                git clone "https://github.com/kishoreuppathala5283/python_project.git" /var/www/flask_app
                cd /var/www/flask_app
            fi

            # Setup virtual environment
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            source venv/bin/activate

            # Install dependencies
            pip install --upgrade pip
            if [ -f "requirements.txt" ]; then
                pip install -r requirements.txt
            fi
            pip install gunicorn

            # Kill old Gunicorn processes
            pkill -f "gunicorn" || true

            # Start Flask app with Gunicorn
            nohup venv/bin/gunicorn -w 3 -b 0.0.0.0:5000 app:app > app.log 2>&1 &
