name: Python CI/CD to EC2 (Ubuntu + venv)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11  # Your Python version

      # 3️⃣ Install dependencies locally (optional)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run tests
      - name: Run tests
        run: |
          pytest tests/ || echo "No tests found"

      # 5️⃣ SSH to EC2 and deploy using virtual environment
      - name: SSH and deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Update system and install dependencies
            sudo apt update && sudo apt install -y python3-venv python3-pip git

            # Create project folder
            sudo mkdir -p /var/www/python_app
            sudo chown -R ubuntu:ubuntu /var/www/python_app
            sudo chmod -R 755 /var/www/python_app

            # Clone repo or pull latest changes
            if [ -d "/var/www/python_app/.git" ]; then
              cd /var/www/python_app
              git reset --hard
              git pull origin main
            else
              git clone "https://github.com/kishoreuppathala5283/python_project.git" /var/www/python_app
            fi

            cd /var/www/python_app

            # Create virtual environment if it doesn't exist
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi

            # Activate virtual environment and install dependencies
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Stop existing app if running
            pkill -f "venv/bin/python app.py" || echo "App not running"

            # Start app in background inside venv
            nohup venv/bin/python app.py > app.log 2>&1 &
